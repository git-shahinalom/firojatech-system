name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd ~/firojatech-system
          git pull origin main

      - name: Restart Docker services
        run: |
          cd ~/firojatech-system
          docker compose up -d --build
